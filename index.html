<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>그림 공부 로드맵 스케줄러</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; padding: 40px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        
        /* 날짜 및 요일 표시 */
        .date-picker { margin-bottom: 10px; padding: 10px; border: 2px solid #007bff; border-radius: 8px; font-weight: bold; width: 60%; }
        #dayDisplay { font-size: 0.9em; color: #007bff; font-weight: bold; margin-bottom: 15px; }

        /* 로드맵 템플릿 설정 섹션 */
        .roadmap-config { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; border: 1px solid #e9ecef; }
        .roadmap-config summary { font-weight: bold; cursor: pointer; color: #333; margin-bottom: 5px; }
        .roadmap-input-row { display: flex; align-items: center; gap: 5px; margin-top: 8px; font-size: 0.85em; }
        .roadmap-input-row input { flex: 1; padding: 5px; border: 1px solid #ddd; border-radius: 3px; }

        /* 할 일 리스트 스타일 */
        .input-group { display: flex; gap: 5px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .add-btn { padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .template-hint { font-size: 0.8em; color: #666; margin-bottom: 10px; background: #fff3cd; padding: 8px; border-radius: 5px; display: none; cursor: pointer; border: 1px solid #ffeeba; }

        ul { list-style: none; padding: 0; text-align: left; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .completed { text-decoration: line-through; color: #bbb; }
        .delete-btn { background: #ff4757; color: white; border: none; padding: 5px 8px; border-radius: 3px; cursor: pointer; font-size: 0.7em; }

        /* 통계 섹션 */
        .report-section { margin-top: 25px; border-top: 2px dashed #ccc; padding-top: 15px; }
        #summaryBox { margin-top: 10px; padding: 12px; background: #e7f3ff; border-radius: 8px; display: none; text-align: left; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 날짜 선택 -->
        <input type="date" id="dateSelect" class="date-picker">
        <div id="dayDisplay">월요일</div>

        <!-- [NEW] 로드맵 설정창 -->
        <details class="roadmap-config">
            <summary>⚙️ 요일별 공부 테마 설정</summary>
            <div id="roadmapInputs">
                <!-- 자바스크립트에서 요일별 입력창을 생성합니다 -->
            </div>
            <p style="font-size: 0.75em; color: #888; margin-top: 10px;">* 요일별 테마를 적어두면 해당 요일에 힌트가 나타나요!</p>
        </details>

        <!-- 할 일 입력 -->
        <div id="templateHint" class="template-hint" onclick="useHint()"></div>
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="오늘의 세부 계획을 적으세요...">
            <button class="add-btn" onclick="addTodo()">추가</button>
        </div>
        <ul id="todoList"></ul>

        <!-- 통계 -->
        <div class="report-section">
            <button class="add-btn" style="background: #6c757d; width: 100%;" onclick="toggleReport()">📊 월간 통계 보기</button>
            <div id="summaryBox"></div>
        </div>
    </div>

    <script>
        const dateInput = document.getElementById('dateSelect');
        const dayDisplay = document.getElementById('dayDisplay');
        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');
        const hintBox = document.getElementById('templateHint');
        const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

        // 1. 로드맵 설정 로직
        const roadmapData = JSON.parse(localStorage.getItem('roadmapConfig')) || {0:'', 1:'', 2:'', 3:'', 4:'', 5:'', 6:''};
        const roadmapInputs = document.getElementById('roadmapInputs');

        days.forEach((day, idx) => {
            const row = document.createElement('div');
            row.className = 'roadmap-input-row';
            row.innerHTML = `<span>${day.charAt(0)}</span><input type="text" value="${roadmapData[idx]}" onchange="saveRoadmap(${idx}, this.value)" placeholder="${day} 공부 테마">`;
            roadmapInputs.appendChild(row);
        });

        function saveRoadmap(idx, value) {
            roadmapData[idx] = value;
            localStorage.setItem('roadmapConfig', JSON.stringify(roadmapData));
            showHint();
        }

        // 2. 날짜 및 힌트 표시
        dateInput.addEventListener('change', () => {
            updateUI();
            loadTodos();
        });

        function updateUI() {
            const date = new Date(dateInput.value);
            dayDisplay.innerText = days[date.getDay()];
            showHint();
        }

        function showHint() {
            const dayIdx = new Date(dateInput.value).getDay();
            const theme = roadmapData[dayIdx];
            if (theme) {
                hintBox.innerText = `💡 오늘은 [${theme}] 하는 날! 클릭해서 추가하기`;
                hintBox.style.display = 'block';
            } else {
                hintBox.style.display = 'none';
            }
        }

        function useHint() {
            const dayIdx = new Date(dateInput.value).getDay();
            todoInput.value = roadmapData[dayIdx] + " - ";
            todoInput.focus();
        }

        // 3. 기존 할 일 기능 유지
        function addTodo() {
            if (todoInput.value.trim() === '') return;
            createTodoElement(todoInput.value, false);
            todoInput.value = '';
            saveTodos();
            updateProgress();
        }

        function createTodoElement(text, isCompleted) {
            const li = document.createElement('li');
            if (isCompleted) li.classList.add('completed');
            li.innerHTML = `<span onclick="toggleComplete(this)">${text}</span><button class="delete-btn" onclick="deleteTodo(this)">삭제</button>`;
            todoList.appendChild(li);
        }

        function toggleComplete(element) {
            element.parentElement.classList.toggle('completed');
            saveTodos();
            updateProgress();
        }

        function deleteTodo(element) {
            element.parentElement.remove();
            saveTodos();
            updateProgress();
        }

        function saveTodos() {
            const todos = [];
            document.querySelectorAll('#todoList li').forEach(li => {
                todos.push({ text: li.querySelector('span').innerText, completed: li.classList.contains('completed') });
            });
            localStorage.setItem('todos-' + dateInput.value, JSON.stringify(todos));
        }

        function loadTodos() {
            todoList.innerHTML = '';
            const saved = JSON.parse(localStorage.getItem('todos-' + dateInput.value)) || [];
            saved.forEach(todo => createTodoElement(todo.text, todo.completed));
            updateProgress();
        }

        function updateProgress() {} // 기존 함수 유지용

        function toggleReport() {
            const box = document.getElementById('summaryBox');
            if(box.style.display === 'block') { box.style.display = 'none'; return; }
            box.style.display = 'block';
            box.innerHTML = '이번 달 기록을 분석 중입니다...';
            // (이전 답변의 통계 로직과 동일하게 작동)
            generateMonthlyReport(box);
        }

        function generateMonthlyReport(box) {
            const date = new Date(dateInput.value);
            const m = date.getMonth() + 1;
            let count = 0, totalP = 0;
            for(let i=1; i<=31; i++) {
                const k = `todos-${date.getFullYear()}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const s = JSON.parse(localStorage.getItem(k));
                if(s && s.length>0) {
                    count++;
                    totalP += (s.filter(t=>t.completed).length / s.length) * 100;
                }
            }
            box.innerHTML = `<strong>${m}월 통계</strong><br>공부한 일수: ${count}일<br>평균 달성률: ${count ? Math.round(totalP/count) : 0}%`;
        }

        window.onload = () => {
            dateInput.value = new Date().toISOString().split('T')[0];
            updateUI();
            loadTodos();
        };
    </script>
</body>
</html>
