<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>그림 로드맵 대시보드</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 40px; margin: 0; }
        
        /* 메인 레이아웃: 가로 배치 */
        .dashboard { display: flex; gap: 30px; width: 1000px; max-width: 1200px; align-items: flex-start; }
        
        /* 왼쪽 컬럼 (설정 및 관리) */
        .side-panel { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        
        /* 오른쪽 컬럼 (실행 및 리스트) */
        .main-panel { flex: 1.5; background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); min-height: 600px; }

        /* 카드 공통 스타일 */
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

        /* 날짜 & 요일 */
        .header-card { text-align: center; }
        .date-picker { width: 90%; padding: 10px; border: 2px solid var(--primary); border-radius: 8px; font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }
        #dayDisplay { font-size: 1.2em; font-weight: bold; color: var(--primary); }

        /* 설정창 수납 */
        .config-box { overflow: hidden; }
        .config-header { font-weight: bold; cursor: pointer; color: #555; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .config-content { max-height: 400px; overflow-y: auto; font-size: 0.85em; display: none; }
        .day-config-item { margin-bottom: 12px; }
        .day-config-item label { font-weight: bold; color: #333; margin-bottom: 4px; display: block; }
        .config-inputs input { width: 90%; padding: 5px; margin-bottom: 3px; border: 1px solid #ddd; border-radius: 4px; }

        /* 메인 패널 내부 디자인 */
        .guide-box { background: #f8fbff; border-left: 5px solid var(--primary); padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .guide-title { font-size: 1.3em; font-weight: bold; color: #333; margin-bottom: 15px; display: block; }
        .checklist-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 1.05em; }
        .checklist-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        
        .progress-container { background: #eee; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        #progressBar { background: var(--success); width: 0%; height: 100%; transition: width 0.3s; }

        .input-group { display: flex; gap: 8px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .input-group input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #f9f9f9; align-items: center; }
        .done { text-decoration: line-through; color: #bbb; }
        .del-btn { background: #ffebeb; color: #ff4757; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.8em; }

        #summaryBox { font-size: 0.9em; line-height: 1.6; }
    </style>
</head>
<body>

<div class="dashboard">
    <!-- 왼쪽 사이드 바 -->
    <div class="side-panel">
        <div class="card header-card">
            <input type="date" id="dateSelect" class="date-picker">
            <div id="dayDisplay">로딩 중...</div>
        </div>

        <div class="card config-box">
            <div class="config-header" onclick="toggleConfig()">⚙️ 커리큘럼 보관함 <span>▼</span></div>
            <div id="configContent" class="config-content"></div>
        </div>

        <div class="card">
            <button class="btn-add" style="width:100%; background:#6c757d; padding:10px;" onclick="generateMonthlyReport()">📊 월간 통계 갱신</button>
            <div id="summaryBox" style="margin-top:15px;">날짜를 선택하고 버튼을 누르세요.</div>
        </div>
    </div>

    <!-- 오른쪽 메인 판넬 -->
    <div class="main-panel">
        <div id="todayGuide" class="guide-box">
            <span class="guide-title" id="themeTitle">🎯 오늘의 테마</span>
            <div id="checkArea"></div>
            <div class="progress-container"><div id="progressBar"></div></div>
            <div id="themeProgress" style="font-weight: bold; color: var(--success);">달성률: 0%</div>
        </div>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="추가 계획(여행, 일상 등) 입력...">
            <button class="btn-add" onclick="addExtraTodo()">추가</button>
        </div>
        <ul id="extraList"></ul>
    </div>
</div>

<script>
    // [기존 스크립트 로직과 동일하지만 UI에 맞춰 일부 최적화]
    const dateInput = document.getElementById('dateSelect');
    const dayDisplay = document.getElementById('dayDisplay');
    const themeTitle = document.getElementById('themeTitle');
    const checkArea = document.getElementById('checkArea');
    const extraList = document.getElementById('extraList');
    const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

    let roadmap = JSON.parse(localStorage.getItem('roadmap_v2')) || {};

    function initConfig() {
        const container = document.getElementById('configContent');
        days.forEach((day, idx) => {
            const data = roadmap[idx] || { theme: '', items: ['', '', ''] };
            const div = document.createElement('div');
            div.className = 'day-config-item';
            div.innerHTML = `
                <label>${day}</label>
                <div class="config-inputs">
                    <input type="text" placeholder="테마" value="${data.theme}" onchange="saveConfig(${idx}, 'theme', this.value)">
                    <input type="text" placeholder="필수 1" value="${data.items[0] || ''}" onchange="saveConfig(${idx}, 0, this.value)">
                    <input type="text" placeholder="필수 2" value="${data.items[1] || ''}" onchange="saveConfig(${idx}, 1, this.value)">
                </div>
            `;
            container.appendChild(div);
        });
    }

    function saveConfig(dayIdx, type, value) {
        if (!roadmap[dayIdx]) roadmap[dayIdx] = { theme: '', items: ['', '', ''] };
        if (type === 'theme') roadmap[dayIdx].theme = value;
        else roadmap[dayIdx].items[type] = value;
        localStorage.setItem('roadmap_v2', JSON.stringify(roadmap));
        updateTodayUI();
    }

    function toggleConfig() {
        const content = document.getElementById('configContent');
        content.style.display = content.style.display === 'block' ? 'none' : 'block';
    }

    function updateTodayUI() {
        const dateStr = dateInput.value;
        const dateObj = new Date(dateStr);
        const dayIdx = dateObj.getDay();
        dayDisplay.innerText = days[dayIdx];

        const data = roadmap[dayIdx];
        checkArea.innerHTML = '';
        
        if (data && data.theme) {
            themeTitle.innerText = `🎯 오늘의 테마: ${data.theme}`;
            const savedStatus = JSON.parse(localStorage.getItem('status-' + dateStr)) || {};
            data.items.forEach((item, i) => {
                if (!item || item.trim() === '') return;
                const div = document.createElement('div');
                div.className = 'checklist-item';
                const checked = savedStatus[i] ? 'checked' : '';
                div.innerHTML = `<input type="checkbox" ${checked} onchange="saveStatus(${i}, this.checked)"> <span>${item}</span>`;
                checkArea.appendChild(div);
            });
        } else {
            themeTitle.innerText = '🎯 설정된 테마가 없습니다.';
        }
        updateThemeProgress();
        loadExtraTodos();
    }

    function saveStatus(itemIdx, isChecked) {
        const dateStr = dateInput.value;
        const savedStatus = JSON.parse(localStorage.getItem('status-' + dateStr)) || {};
        savedStatus[itemIdx] = isChecked;
        localStorage.setItem('status-' + dateStr, JSON.stringify(savedStatus));
        updateThemeProgress();
    }

    function updateThemeProgress() {
        const checks = checkArea.querySelectorAll('input[type="checkbox"]');
        const checked = checkArea.querySelectorAll('input[type="checkbox"]:checked');
        const percent = checks.length === 0 ? 0 : Math.round((checked.length / checks.length) * 100);
        document.getElementById('progressBar').style.width = percent + "%";
        document.getElementById('themeProgress').innerText = `테마 달성률: ${percent}%`;
    }

    function addExtraTodo() {
        const input = document.getElementById('todoInput');
        if (input.value.trim() === '') return;
        const dateStr = dateInput.value;
        const extras = JSON.parse(localStorage.getItem('extra-' + dateStr)) || [];
        extras.push({ text: input.value, done: false });
        localStorage.setItem('extra-' + dateStr, JSON.stringify(extras));
        input.value = '';
        loadExtraTodos();
    }

    function loadExtraTodos() {
        extraList.innerHTML = '';
        const dateStr = dateInput.value;
        const extras = JSON.parse(localStorage.getItem('extra-' + dateStr)) || [];
        extras.forEach((todo, i) => {
            const li = document.createElement('li');
            li.innerHTML = `<span class="${todo.done ? 'done' : ''}" onclick="toggleExtra(${i})">${todo.text}</span><button class="del-btn" onclick="delExtra(${i})">삭제</button>`;
            extraList.appendChild(li);
        });
    }

    function toggleExtra(i) {
        const dateStr = dateInput.value;
        const extras = JSON.parse(localStorage.getItem('extra-' + dateStr));
        extras[i].done = !extras[i].done;
        localStorage.setItem('extra-' + dateStr, JSON.stringify(extras));
        loadExtraTodos();
    }

    function delExtra(i) {
        const dateStr = dateInput.value;
        const extras = JSON.parse(localStorage.getItem('extra-' + dateStr));
        extras.splice(i, 1);
        localStorage.setItem('extra-' + dateStr, JSON.stringify(extras));
        loadExtraTodos();
    }

    function generateMonthlyReport() {
        const box = document.getElementById('summaryBox');
        const date = new Date(dateInput.value);
        const y = date.getFullYear();
        const m = date.getMonth() + 1;
        let count = 0, totalP = 0;
        for(let i=1; i<=31; i++) {
            const k = `status-${y}-${String(m).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const s = JSON.parse(localStorage.getItem(k));
            if(s) {
                count++;
                const keys = Object.keys(s);
                const done = Object.values(s).filter(v => v).length;
                totalP += (done / keys.length) * 100;
            }
        }
        box.innerHTML = `<strong>${m}월 통계</strong><br>공부한 날: ${count}일<br>평균 달성률: ${count ? Math.round(totalP/count) : 0}%`;
    }

    window.onload = () => {
        dateInput.value = new Date().toISOString().split('T')[0];
        initConfig();
        updateTodayUI();
    };
    dateInput.addEventListener('change', updateTodayUI);
</script>

</body>
</html>
