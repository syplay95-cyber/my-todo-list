<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>그림 팀 대시보드 Pro</title>
    <style>
        :root { --primary: #007bff; --userA: #6c5ce7; --userB: #fd79a8; --vacation: #ff9f43; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 0; transition: 0.3s; }
        
        /* 유저 선택 화면 */
        #portal { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 30px; }
        .user-cards { display: flex; gap: 30px; }
        .user-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; text-align: center; width: 180px; border-top: 10px solid #ddd; }
        .user-card:hover { transform: translateY(-5px); }
        .user-card.a { border-color: var(--userA); }
        .user-card.b { border-color: var(--userB); }

        /* 메인 레이아웃 */
        #dashboard { display: none; padding: 20px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .dashboard-grid { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; align-items: flex-start; }
        
        .side-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 320px; }
        .main-panel { flex: 2; display: flex; flex-direction: column; gap: 15px; }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .theme-a { --primary: var(--userA); }
        .theme-b { --primary: var(--userB); }

        /* 체크리스트 및 캘린더 스타일 (이전 스타일 통합) */
        .guide-box { background: #f8fbff; border-left: 5px solid var(--primary); padding: 20px; border-radius: 12px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .calendar-day { font-size: 0.8em; padding: 8px 0; text-align: center; border-radius: 4px; border: 1px solid #f0f0f0; cursor: pointer; }
        .calendar-day.today { border: 2px solid var(--primary); font-weight: bold; }
        .calendar-day.vacation { background: var(--vacation); color: white; }
        
        .input-group { display: flex; gap: 5px; margin-top: 15px; }
        .input-group input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div id="portal">
    <h1>🎨 우리들의 그림 로드맵</h1>
    <div class="user-cards">
        <div class="user-card a" onclick="startUser('A')"><h2>사용자 A</h2></div>
        <div class="user-card b" onclick="startUser('B')"><h2>사용자 B</h2></div>
    </div>
</div>

<div id="dashboard">
    <div class="nav-bar">
        <button class="btn" onclick="location.reload()">◀ 나가기</button>
        <h2 id="userLabel">사용자</h2>
        <button class="btn btn-blue" onclick="syncToCloud()">☁️ 시트에 저장</button>
    </div>

    <div class="dashboard-grid">
        <!-- 왼쪽: 관리영역 -->
        <div class="side-panel">
            <div class="card">
                <input type="date" id="dateSelect" style="width:100%; padding:8px;" onchange="refresh()">
            </div>
            
            <div class="card">
                <div onclick="toggleBox('configContent')" style="cursor:pointer; font-weight:bold;">⚙️ 커리큘럼 설정 ▾</div>
                <div id="configContent" style="display:none; margin-top:10px;"></div>
            </div>

            <div class="card">
                <div style="font-weight:bold; font-size:0.9em;">🗓️ 휴가/일정 캘린더</div>
                <div id="miniCalendar" class="calendar-grid"></div>
            </div>

            <div class="card">
                <button class="btn" style="width:100%; background:#6c757d; color:white;" onclick="calcStats()">📊 월간 통계 보기</button>
                <div id="statBox" style="margin-top:10px; font-size:0.85em;"></div>
            </div>
        </div>

        <!-- 오른쪽: 실행영역 -->
        <div class="main-panel">
            <div class="card guide-box">
                <h3 id="themeTitle" style="margin:0;">🎯 오늘의 테마</h3>
                <div id="checkArea" style="margin: 20px 0;"></div>
                <div style="background:#eee; height:10px; border-radius:5px; overflow:hidden;">
                    <div id="progressBar" style="background:#28a745; width:0%; height:100%; transition:0.3s;"></div>
                </div>
                <div id="progressText" style="margin-top:10px; font-weight:bold; color:#28a745;">0%</div>
            </div>

            <div class="card">
                <div style="font-weight:bold;">📝 개별 메모</div>
                <div class="input-group">
                    <input type="text" id="memoInput" placeholder="오늘만 특별히 할 일...">
                    <button class="btn btn-blue" onclick="addMemo()">추가</button>
                </div>
                <ul id="memoList" style="list-style:none; padding:0; margin-top:15px;"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = '여기에_복사한_주소를_넣으세요'; // 👈 꼭 확인!
    let user = '';
    const dateIn = document.getElementById('dateSelect');

    function startUser(u) {
        user = u;
        document.getElementById('portal').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.body.className = 'theme-' + u.toLowerCase();
        document.getElementById('userLabel').innerText = `사용자 ${u}의 대시보드`;
        dateIn.value = new Date().toISOString().split('T')[0];
        initSetup();
        refresh();
    }

    function initSetup() {
        const conf = document.getElementById('configContent');
        const roadmap = JSON.parse(localStorage.getItem(user+'-rm')) || {};
        const days = ['일','월','화','수','목','금','토'];
        conf.innerHTML = '';
        days.forEach((d, i) => {
            const data = roadmap[i] || { t: '', i: ['', ''] };
            conf.innerHTML += `
                <div style="margin-bottom:8px;">
                    <b>${d}요일</b>
                    <input type="text" placeholder="테마" value="${data.t||''}" onchange="saveConf(${i}, 't', this.value)" style="width:100%; margin:2px 0;">
                    <input type="text" placeholder="항목1" value="${data.i[0]||''}" onchange="saveConf(${i}, 0, this.value)" style="width:48%;">
                    <input type="text" placeholder="항목2" value="${data.i[1]||''}" onchange="saveConf(${i}, 1, this.value)" style="width:48%;">
                </div>`;
        });
    }

    function saveConf(idx, type, val) {
        let rm = JSON.parse(localStorage.getItem(user+'-rm')) || {};
        if(!rm[idx]) rm[idx] = { t: '', i: ['', ''] };
        if(type === 't') rm[idx].t = val;
        else rm[idx].i[type] = val;
        localStorage.setItem(user+'-rm', JSON.stringify(rm));
        refresh();
    }

    function refresh() {
        const d = new Date(dateIn.value);
        const rm = JSON.parse(localStorage.getItem(user+'-rm')) || {};
        const todayData = rm[d.getDay()];
        const area = document.getElementById('checkArea');
        area.innerHTML = '';

        if(todayData && todayData.t) {
            document.getElementById('themeTitle').innerText = `🎯 오늘의 테마: ${todayData.t}`;
            const status = JSON.parse(localStorage.getItem(user+'-st-'+dateIn.value)) || {};
            todayData.i.forEach((item, i) => {
                if(!item) return;
                const c = status[i] ? 'checked' : '';
                area.innerHTML += `<div><input type="checkbox" ${c} onchange="saveStatus(${i}, this.checked)"> ${item}</div>`;
            });
        }
        renderCal();
        loadMemos();
        updateProg();
    }

    function saveStatus(i, c) {
        const status = JSON.parse(localStorage.getItem(user+'-st-'+dateIn.value)) || {};
        status[i] = c;
        localStorage.setItem(user+'-st-'+dateIn.value, JSON.stringify(status));
        updateProg();
    }

    function updateProg() {
        const all = document.querySelectorAll('#checkArea input').length;
        const done = document.querySelectorAll('#checkArea input:checked').length;
        const p = all ? Math.round(done/all*100) : 0;
        document.getElementById('progressBar').style.width = p + '%';
        document.getElementById('progressText').innerText = '달성률: ' + p + '%';
    }

    function renderCal() {
        const cal = document.getElementById('miniCalendar');
        cal.innerHTML = '';
        const date = new Date(dateIn.value);
        const last = new Date(date.getFullYear(), date.getMonth()+1, 0).getDate();
        const vacs = JSON.parse(localStorage.getItem(user+'-vac')) || [];
        
        for(let i=1; i<=last; i++) {
            const cur = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const isV = vacs.includes(cur) ? 'vacation' : '';
            const isT = cur === dateIn.value ? 'today' : '';
            cal.innerHTML += `<div class="calendar-day ${isV} ${isT}" onclick="toggleVac('${cur}')">${i}</div>`;
        }
    }

    function toggleVac(d) {
        let v = JSON.parse(localStorage.getItem(user+'-vac')) || [];
        const idx = v.indexOf(d);
        if(idx > -1) v.splice(idx, 1); else v.push(d);
        localStorage.setItem(user+'-vac', JSON.stringify(v));
        renderCal();
    }

    async function syncToCloud() {
        const btn = event.target;
        btn.innerText = '⏳ 저장 중...';
        const payload = {
            user: user,
            date: dateIn.value,
            theme: document.getElementById('themeTitle').innerText,
            progress: document.getElementById('progressText').innerText
        };

        try {
            // 주소 끝에 ?callback=... 을 붙이지 않아도 되도록 POST 방식 최적화
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // CORS 정책 우회
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert('기록이 전송되었습니다! (구글 시트를 확인하세요)');
            btn.innerText = '☁️ 시트에 저장';
        } catch (e) {
            alert('저장 실패: URL을 확인하거나 다시 배포해 보세요.');
            btn.innerText = '☁️ 시트에 저장';
        }
    }

    // 메모 및 기타 기능
    function addMemo() {
        const input = document.getElementById('memoInput');
        if(!input.value) return;
        const list = JSON.parse(localStorage.getItem(user+'-ex-'+dateIn.value)) || [];
        list.push({t: input.value, d: false});
        localStorage.setItem(user+'-ex-'+dateIn.value, JSON.stringify(list));
        input.value = '';
        loadMemos();
    }

    function loadMemos() {
        const list = JSON.parse(localStorage.getItem(user+'-ex-'+dateIn.value)) || [];
        const el = document.getElementById('memoList');
        el.innerHTML = '';
        list.forEach((item, i) => {
            el.innerHTML += `<li style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span style="${item.d?'text-decoration:line-through; color:#ccc':''}" onclick="toggleMemo(${i})">${item.t}</span>
                <span onclick="delMemo(${i})" style="color:red; cursor:pointer;">✕</span>
            </li>`;
        });
    }

    function toggleMemo(i) {
        const list = JSON.parse(localStorage.getItem(user+'-ex-'+dateIn.value));
        list[i].d = !list[i].d;
        localStorage.setItem(user+'-ex-'+dateIn.value, JSON.stringify(list));
        loadMemos();
    }

    function delMemo(i) {
        const list = JSON.parse(localStorage.getItem(user+'-ex-'+dateIn.value));
        list.splice(i, 1);
        localStorage.setItem(user+'-ex-'+dateIn.value, JSON.stringify(list));
        loadMemos();
    }

    function toggleBox(id) {
        const target = document.getElementById(id);
        target.style.display = target.style.display === 'none' ? 'block' : 'none';
    }

    function calcStats() {
        const now = new Date(dateIn.value);
        let days = 0, totalP = 0;
        for(let i=1; i<=31; i++) {
            const k = user + `-st-${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const s = JSON.parse(localStorage.getItem(k));
            if(s) { days++; totalP += (Object.values(s).filter(v=>v).length / Object.values(s).length) * 100; }
        }
        document.getElementById('statBox').innerHTML = `이번 달 공부 일수: <b>${days}일</b><br>평균 달성률: <b>${days?Math.round(totalP/days):0}%</b>`;
    }
</script>
</body>
</html>
