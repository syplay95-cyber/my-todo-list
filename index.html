<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>그림 로드맵 & 마스터 스케줄러</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; }
        body { font-family: 'Malgun Gothic', sans-serif; display: flex; justify-content: center; padding: 20px; background-color: var(--bg); }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 480px; }
        
        /* 헤더 및 날짜 */
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .date-picker { padding: 8px; border: 2px solid var(--primary); border-radius: 5px; font-weight: bold; margin-bottom: 5px; }
        #dayDisplay { font-weight: bold; color: var(--primary); font-size: 1.1em; }

        /* 요일별 테마 설정 (수납 공간) */
        .config-box { background: #fff; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .config-header { background: #f8f9fa; padding: 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .config-content { padding: 15px; display: none; border-top: 1px solid #ddd; }
        .day-config-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dotted #ccc; }
        .day-config-item label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        .config-inputs { display: flex; flex-direction: column; gap: 5px; }
        .config-inputs input { padding: 6px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.85em; }

        /* 오늘 공부 가이드 및 할 일 */
        .guide-box { background: #e7f3ff; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; }
        .guide-title { font-weight: bold; color: var(--primary); margin-bottom: 8px; display: block; }
        .checklist-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 0.9em; }
        .checklist-item input { cursor: pointer; }

        .input-group { display: flex; gap: 5px; margin-bottom: 15px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }

        /* 리스트 및 기타 */
        ul { list-style: none; padding: 0; }
        li { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .done { text-decoration: line-through; color: #aaa; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 4px 8px; border-radius: 3px; font-size: 0.7em; cursor: pointer; }
        
        .progress-info { font-size: 0.85em; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <input type="date" id="dateSelect" class="date-picker">
            <div id="dayDisplay">월요일</div>
        </div>

        <!-- 설정 섹션 -->
        <div class="config-box">
            <div class="config-header" onclick="toggleConfig()">⚙️ 요일별 공부 커리큘럼 보관함 <span>▼</span></div>
            <div id="configContent" class="config-content">
                <!-- 요일별 입력창이 자바스크립트로 생성됨 -->
            </div>
        </div>

        <!-- 오늘 테마 가이드 -->
        <div id="todayGuide" class="guide-box">
            <span class="guide-title" id="themeTitle">오늘의 테마: 설정 없음</span>
            <div id="checkArea"></div>
            <div id="themeProgress" class="progress-info">테마 달성률: 0%</div>
        </div>

        <!-- 추가적인 일일 할 일 -->
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="추가 계획(여행, 일상 등)을 적으세요...">
            <button class="btn-add" onclick="addExtraTodo()">추가</button>
        </div>
        <ul id="extraList"></ul>
    </div>

    <script>
        const dateInput = document.getElementById('dateSelect');
        const dayDisplay = document.getElementById('dayDisplay');
        const themeTitle = document.getElementById('themeTitle');
        const checkArea = document.getElementById('checkArea');
        const extraList = document.getElementById('extraList');
        const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

        // 데이터 구조: { 요일인덱스: { theme: '제목', items: ['항목1', '항목2'] } }
        let roadmap = JSON.parse(localStorage.getItem('roadmap_v2')) || {};

        // 1. 설정 창 초기화
        function initConfig() {
            const container = document.getElementById('configContent');
            days.forEach((day, idx) => {
                const data = roadmap[idx] || { theme: '', items: ['', '', ''] };
                const div = document.createElement('div');
                div.className = 'day-config-item';
                div.innerHTML = `
                    <label>${day}</label>
                    <div class="config-inputs">
                        <input type="text" placeholder="테마 명 (예: 얼굴 공부)" value="${data.theme}" onchange="saveConfig(${idx}, 'theme', this.value)">
                        <input type="text" placeholder="필수 항목 1" value="${data.items[0] || ''}" onchange="saveConfig(${idx}, 0, this.value)">
                        <input type="text" placeholder="필수 항목 2" value="${data.items[1] || ''}" onchange="saveConfig(${idx}, 1, this.value)">
                        <input type="text" placeholder="필수 항목 3" value="${data.items[2] || ''}" onchange="saveConfig(${idx}, 2, this.value)">
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function saveConfig(dayIdx, type, value) {
            if (!roadmap[dayIdx]) roadmap[dayIdx] = { theme: '', items: ['', '', ''] };
            if (type === 'theme') roadmap[dayIdx].theme = value;
            else roadmap[dayIdx].items[type] = value;
            localStorage.setItem('roadmap_v2', JSON.stringify(roadmap));
            updateTodayUI();
        }

        function toggleConfig() {
            const content = document.getElementById('configContent');
            content.style.display = content.style.display === 'block' ? 'none' : 'block';
        }

        // 2. 화면 업데이트 (핵심 기능)
        function updateTodayUI() {
            const dateStr = dateInput.value;
            const dateObj = new Date(dateStr);
            const dayIdx = dateObj.getDay();
            dayDisplay.innerText = days[dayIdx];

            const data = roadmap[dayIdx];
            checkArea.innerHTML = '';
            
            if (data && data.theme) {
                themeTitle.innerText = `🎯 오늘의 테마: ${data.theme}`;
                
                // 해당 날짜의 체크 상태 로드
                const savedStatus = JSON.parse(localStorage.getItem('status-' + dateStr)) || {};

                data.items.forEach((item, i) => {
                    if (item.trim() === '') return;
                    const div = document.createElement('div');
                    div.className = 'checklist-item';
                    const checked = savedStatus[i] ? 'checked' : '';
                    div.innerHTML = `
                        <input type="checkbox" ${checked} onchange="saveStatus(${i}, this.checked)">
                        <span>${item}</span>
                    `;
                    checkArea.appendChild(div);
                });
            } else {
                themeTitle.innerText = '설정된 테마가 없습니다.';
            }
            updateThemeProgress();
            loadExtraTodos();
        }

        function saveStatus(itemIdx, isChecked) {
            const dateStr = dateInput.value;
            const savedStatus = JSON.parse(localStorage.getItem('status-' + dateStr)) || {};
            savedStatus[itemIdx] = isChecked;
            localStorage.setItem('status-' + dateStr, JSON.stringify(savedStatus));
            updateThemeProgress();
        }

        function updateThemeProgress() {
            const checks = checkArea.querySelectorAll('input[type="checkbox"]');
            const checked = checkArea.querySelectorAll('input[type="checkbox"]:checked');
            const percent = checks.length === 0 ? 0 : Math.round((checked.length / checks.length) * 100);
            document.getElementById('themeProgress').innerText = `테마 달성률: ${percent}%`;
        }

        // 3. 일회성 추가 할 일 (유기적인 수정용)
        function addExtraTodo() {
            const input = document.getElementById('todoInput');
            if (input.value.trim() === '') return;
            const dateStr = dateInput.value;
            const extras = JSON.parse(localStorage.getItem('extra-' + dateStr)) || [];
            extras.push({ text: input.value, done: false });
            localStorage.setItem('extra-' + dateStr, JSON.stringify(extras));
            input.value = '';
            loadExtraTodos();
        }

        function loadExtraTodos() {
            extraList.innerHTML = '';
            const dateStr = dateInput.value;
            const extras = JSON.parse(localStorage.getItem('extra-' + dateStr)) || [];
            extras.forEach((todo, i) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="${todo.done ? 'done' : ''}" onclick="toggleExtra(${i})">${todo.text}</span>
                    <button class="del-btn" onclick="delExtra(${i})">삭제</button>
                `;
                extraList.appendChild(li);
            });
        }

        function toggleExtra(i) {
            const dateStr = dateInput.value;
            const extras = JSON.parse(localStorage.getItem('extra-' + dateStr));
            extras[i].done = !extras[i].done;
            localStorage.setItem('extra-' + dateStr, JSON.stringify(extras));
            loadExtraTodos();
        }

        function delExtra(i) {
            const dateStr = dateInput.value;
            const extras = JSON.parse(localStorage.getItem('extra-' + dateStr));
            extras.splice(i, 1);
            localStorage.setItem('extra-' + dateStr, JSON.stringify(extras));
            loadExtraTodos();
        }

        window.onload = () => {
            dateInput.value = new Date().toISOString().split('T')[0];
            initConfig();
            updateTodayUI();
        };
        dateInput.addEventListener('change', updateTodayUI);
    </script>
</body>
</html>
