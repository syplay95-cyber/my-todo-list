<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>우리들의 그림 팀 대시보드</title>
    <style>
        :root { --primary: #007bff; --userA: #6c5ce7; --userB: #fd79a8; --bg: #f0f2f5; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        
        /* 유저 선택 화면 */
        #portal { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 30px; }
        .user-cards { display: flex; gap: 30px; }
        .user-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 200px; position: relative; border-top: 10px solid #ddd; }
        .user-card.a { border-color: var(--userA); }
        .user-card.b { border-color: var(--userB); }
        .name-display { font-size: 1.5em; font-weight: bold; margin: 15px 0; cursor: pointer; }
        .edit-btn { font-size: 0.8em; color: #888; cursor: pointer; text-decoration: underline; }
        .btn-go { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }

        /* 대시보드 (기존 스타일 동일) */
        #dashboard { display: none; padding: 20px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 20px; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .side { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .main { flex: 2; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* 캘린더/체크박스 스타일 생략 (이전과 동일) */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .calendar-day { font-size: 0.8em; padding: 8px 0; text-align: center; border-radius: 4px; border: 1px solid #f0f0f0; cursor: pointer; }
        .calendar-day.today { border: 2px solid #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div id="portal">
    <h1>🎨 그림 팀 대시보드</h1>
    <div class="user-cards">
        <!-- 사용자 1 -->
        <div class="user-card a">
            <div id="nameA" class="name-display" onclick="changeName('A')">사용자 A</div>
            <span class="edit-btn" onclick="changeName('A')">이름 수정</span>
            <button class="btn-go" style="background:var(--userA)" onclick="startUser('A')">입장하기</button>
        </div>
        <!-- 사용자 2 -->
        <div class="user-card b">
            <div id="nameB" class="name-display" onclick="changeName('B')">사용자 B</div>
            <span class="edit-btn" onclick="changeName('B')">이름 수정</span>
            <button class="btn-go" style="background:var(--userB)" onclick="startUser('B')">입장하기</button>
        </div>
    </div>
</div>

<div id="dashboard">
    <div class="nav-bar">
        <button onclick="location.reload()" style="cursor:pointer; border:none; background:none;">◀ 유저 변경</button>
        <h2 id="userNameTitle">사용자님의 대시보드</h2>
        <button id="syncBtn" onclick="syncToCloud()" style="background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">☁️ 시트 저장</button>
    </div>
    <!-- ... 나머지 대시보드 HTML 구조 (이전 답변과 동일하게 유지) ... -->
    <div class="container">
        <div class="side">
            <div class="card"><input type="date" id="dateSelect" onchange="refresh()" style="width:100%; padding:10px;"></div>
            <div class="card"><div id="configArea"></div></div>
            <div class="card"><div id="miniCalendar" class="calendar-grid"></div></div>
        </div>
        <div class="main">
            <div id="themeBox" style="background:#f8fbff; padding:20px; border-radius:12px; border-left:6px solid #007bff;">
                <h3 id="themeTitle">🎯 오늘의 테마</h3>
                <div id="checkArea" style="margin: 20px 0;"></div>
                <div id="progressInfo" style="font-weight:bold; color:#28a745;">달성률: 0%</div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = '사용자님의_구글_스크립트_URL'; // 👈 여기에 꼭 주소를 넣으세요!
    let currentUserKey = ''; // A 또는 B
    let currentUserName = ''; // 실제 이름

    window.onload = () => {
        // 저장된 이름 불러오기
        const savedA = localStorage.getItem('name-A') || '사용자 A';
        const savedB = localStorage.getItem('name-B') || '사용자 B';
        document.getElementById('nameA').innerText = savedA;
        document.getElementById('nameB').innerText = savedB;
    };

    function changeName(key) {
        const newName = prompt("새로운 이름을 입력하세요:", document.getElementById('name' + key).innerText);
        if (newName) {
            localStorage.setItem('name-' + key, newName);
            document.getElementById('name' + key).innerText = newName;
        }
    }

    function startUser(key) {
        currentUserKey = key;
        currentUserName = localStorage.getItem('name-' + key) || '사용자 ' + key;
        document.getElementById('portal').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userNameTitle').innerText = `${currentUserName}님의 대시보드`;
        // ... (나머지 refresh 및 초기화 로직 호출) ...
        document.getElementById('dateSelect').value = new Date().toISOString().split('T')[0];
        refresh();
    }

    // [기존의 refresh, saveStatus, saveConfig 함수들을 여기에 유지]
    // syncToCloud 함수에서 user 필드에 currentUserKey 대신 currentUserName을 넣으면 시트에 이름이 찍힙니다!
    async function syncToCloud() {
        const btn = document.getElementById('syncBtn');
        btn.innerText = '⏳ 저장 중...';
        
        const payload = {
            user: currentUserName, // 👈 이제 'A'가 아니라 '루카' 같은 이름이 저장됩니다.
            date: document.getElementById('dateSelect').value,
            theme: document.getElementById('themeTitle').innerText,
            progress: document.getElementById('progressInfo').innerText
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert('구글 시트에 저장 완료!');
            btn.innerText = '☁️ 시트 저장';
        } catch (e) {
            alert('오류 발생!');
            btn.innerText = '☁️ 시트 저장';
        }
    }

    // (나머지 세부 함수들은 이전 코드와 동일하게 구현)
    function refresh() { /* ... */ }
</script>
</body>
</html>
