<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>우리들의 그림 대시보드</title>
    <style>
        :root { --primary: #007bff; --userA: #6c5ce7; --userB: #fd79a8; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        
        /* 메인 포털 */
        #portal { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 30px; }
        .user-cards { display: flex; gap: 30px; }
        .user-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; text-align: center; width: 220px; border-top: 10px solid #ddd; }
        .user-card:hover { transform: translateY(-10px); }
        .user-card.a { border-color: var(--userA); }
        .user-card.b { border-color: var(--userB); }
        
        /* 대시보드 레이아웃 */
        #dashboard { display: none; padding: 20px; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; align-items: flex-start; }
        
        .side { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 320px; }
        .main { flex: 1.5; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); min-height: 500px; }
        
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-back { background: #eee; }
        .btn-save { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        
        /* 유저별 테마 */
        .theme-a { --primary: var(--userA); }
        .theme-b { --primary: var(--userB); }

        /* 체크리스트 */
        .guide-box { background: #f8fbff; border-left: 5px solid var(--primary); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .check-item { display: flex; align-items: center; gap: 12px; margin: 12px 0; font-size: 1.1em; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
        .progress-container { background: #eee; height: 12px; border-radius: 6px; margin: 15px 0; overflow: hidden; }
        #progressBar { background: #28a745; width: 0%; height: 100%; transition: 0.3s; }
    </style>
</head>
<body>

<!-- 1. 포털 화면 -->
<div id="portal">
    <h1 style="color: #333;">🎨 그림 팀 스케줄러</h1>
    <div class="user-cards">
        <div class="user-card a" onclick="initUser('A')">
            <h2>사용자 A</h2>
            <p>공부하러 가기 →</p>
        </div>
        <div class="user-card b" onclick="initUser('B')">
            <h2>사용자 B</h2>
            <p>공부하러 가기 →</p>
        </div>
    </div>
    <p id="syncStatus" style="color: #888; font-size: 0.9em;">상태: 온라인 연동 준비 완료</p>
</div>

<!-- 2. 대시보드 화면 -->
<div id="dashboard">
    <div class="nav-bar">
        <button class="btn btn-back" onclick="location.reload()">◀ 유저 선택</button>
        <h2 id="userNameDisplay" style="margin:0;">사용자</h2>
        <div id="syncIndicator" style="font-size: 0.8em; color: var(--primary);">● 실시간 동기화 중</div>
    </div>

    <div class="container">
        <div class="side">
            <div class="card">
                <label style="display:block; margin-bottom:10px; font-weight:bold;">날짜 선택</label>
                <input type="date" id="dateSelect" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            </div>
            
            <div class="card">
                <div style="font-weight:bold; margin-bottom:10px;">⚙️ 요일별 테마 설정</div>
                <div id="configArea" style="font-size:0.85em;">
                    <!-- 스크립트로 생성 -->
                </div>
            </div>
        </div>

        <div class="main">
            <div class="guide-box">
                <h3 id="themeTitle" style="margin:0 0 15px 0;">🎯 오늘의 테마</h3>
                <div id="checkArea"></div>
                <div class="progress-container"><div id="progressBar"></div></div>
                <div id="progressText" style="font-weight:bold; color:#28a745;">달성률: 0%</div>
            </div>
            <button class="btn btn-save" onclick="syncToCloud()">☁️ 구글 시트에 기록 저장하기</button>
            <p style="font-size: 0.8em; color: #999; margin-top: 10px; text-align: center;">* 저장 버튼을 누르면 상대방도 내 진도를 볼 수 있습니다.</p>
        </div>
    </div>
</div>

<script>
    // ⚠️ 중요: 아까 복사한 주소를 여기에 넣으세요!
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwukQeWbv1IwCNVj0BXfTtrmXXf5T-bbHzPQzdzrUFVcJeOml4x149vHI9zVvSoH4W_/exec';
    
    let currentUser = '';
    const dateInput = document.getElementById('dateSelect');
    const days = ['일','월','화','수','목','금','토'];

    function initUser(user) {
        currentUser = user;
        document.getElementById('portal').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.body.className = user === 'A' ? 'theme-a' : 'theme-b';
        document.getElementById('userNameDisplay').innerText = `사용자 ${user}의 공간`;
        
        dateInput.value = new Date().toISOString().split('T')[0];
        renderConfig();
        updateUI();
    }

    // 설정 영역 생성
    function renderConfig() {
        const area = document.getElementById('configArea');
        const roadmap = JSON.parse(localStorage.getItem(currentUser + '-roadmap')) || {};
        area.innerHTML = '';
        days.forEach((day, idx) => {
            const data = roadmap[idx] || { theme: '', items: ['', ''] };
            area.innerHTML += `
                <div style="margin-bottom:10px;">
                    <b>${day}요일</b>
                    <input type="text" placeholder="테마" value="${data.theme}" onchange="saveConfig(${idx}, 'theme', this.value)" style="width:100%; padding:5px; margin-top:3px;">
                </div>`;
        });
    }

    function saveConfig(idx, type, val) {
        let roadmap = JSON.parse(localStorage.getItem(currentUser + '-roadmap')) || {};
        if(!roadmap[idx]) roadmap[idx] = { theme: '', items: ['기본항목 1', '기본항목 2'] };
        if(type==='theme') roadmap[idx].theme = val;
        localStorage.setItem(currentUser + '-roadmap', JSON.stringify(roadmap));
        updateUI();
    }

    function updateUI() {
        const d = new Date(dateInput.value);
        const roadmap = JSON.parse(localStorage.getItem(currentUser + '-roadmap')) || {};
        const data = roadmap[d.getDay()];
        const checkArea = document.getElementById('checkArea');
        checkArea.innerHTML = '';

        if(data && data.theme) {
            document.getElementById('themeTitle').innerText = `🎯 오늘의 테마: ${data.theme}`;
            const status = JSON.parse(localStorage.getItem(currentUser + '-status-' + dateInput.value)) || {};
            // 기본 2개 항목으로 설정
            const items = data.items || ['공부하기 1', '공부하기 2'];
            items.forEach((item, i) => {
                const checked = status[i] ? 'checked' : '';
                checkArea.innerHTML += `
                    <div class="check-item">
                        <input type="checkbox" ${checked} onchange="saveStatus(${i}, this.checked)">
                        <span>${item}</span>
                    </div>`;
            });
        }
        updateProgress();
    }

    function saveStatus(idx, isChecked) {
        const key = currentUser + '-status-' + dateInput.value;
        const status = JSON.parse(localStorage.getItem(key)) || {};
        status[idx] = isChecked;
        localStorage.setItem(key, JSON.stringify(status));
        updateProgress();
    }

    function updateProgress() {
        const checks = document.querySelectorAll('#checkArea input').length;
        const checked = document.querySelectorAll('#checkArea input:checked').length;
        const p = checks ? Math.round(checked/checks*100) : 0;
        document.getElementById('progressBar').style.width = p + '%';
        document.getElementById('progressText').innerText = `달성률: ${p}%`;
    }

    // 클라우드 저장 (구글 시트로 전송)
    async function syncToCloud() {
        const theme = document.getElementById('themeTitle').innerText;
        const progress = document.getElementById('progressText').innerText;
        const status = document.getElementById('syncIndicator');
        
        status.innerText = '⏳ 저장 중...';
        
        const payload = {
            user: currentUser,
            date: dateInput.value,
            theme: theme,
            progress: progress
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            status.innerText = '✅ 구글 시트 저장 완료!';
            setTimeout(() => status.innerText = '● 실시간 동기화 중', 3000);
        } catch (e) {
            status.innerText = '❌ 저장 실패 (주소 확인 필요)';
        }
    }

    dateInput.addEventListener('change', updateUI);
</script>

</body>
</html>
